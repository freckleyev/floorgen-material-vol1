<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roof Tiles Generator</title>
  <link rel="stylesheet" href="style_full.css" />
  <base target="_blank">
</head>


<body>

    <div class="product-container">
        <header class="product-header">
            <h1 class="product-title">Floor Generator 3.0 Material Pack Vol. 1</h1>
            <p class="product-subtitle">Count: <span class="highlight" id="material-count">0 materials</span></p>
        </header>

        <section class="product-grid-container">
            <div class="product-grid">
                <div id="products-container"></div>
            </div>
        </section>

    </div>

    <script>
        document.body.insertAdjacentHTML('beforeend', `
            <div id="lightbox" class="lightbox-overlay">
                <span class="lightbox-close" id="close-lightbox">&times;</span>
                <img class="lightbox-img" id="lightbox-img" src="" alt="Preview">
            </div>
        `);

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        // Function to open Lightbox
        function openPreview(src) {
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop scrolling
        }

        // Function to close Lightbox
        function closePreview() {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto'; // Restore scrolling
        }

        // Event Listeners for closing
        document.getElementById('close-lightbox').onclick = closePreview;
        lightbox.onclick = (e) => { if (e.target === lightbox) closePreview(); };
        document.addEventListener('keydown', (e) => { if (e.key === "Escape") closePreview(); });

        fetch('products.json')
            .then(res => res.json())
            .then(data => {

                // SET COUNT
                const countElement = document.getElementById('material-count');
                countElement.textContent = `${data.length} materials`;

                // 1. SORT: Category Descending, then Title Ascending
                data.sort((a, b) => {
                    // Sort by Category (Descending)
                    if (a.category > b.category) return -1;
                    if (a.category < b.category) return 1;

                    // If categories are the same, sort by Title (Ascending)
                    return a.title.localeCompare(b.title);
                });

                const container = document.getElementById('products-container');
                const categories = {};

                // 2. Group by category 
                // (Because we sorted 'data' first, categories will be created in Descending order)
                data.forEach(item => {
                    if (!categories[item.category]) {
                        categories[item.category] = [];
                    }
                    categories[item.category].push(item);
                });

                // 3. Build HTML
                for (const category in categories) {
                    container.innerHTML += `
                <section class="product-grid-container">
                  <h1 align="center"><b>${category}</b></h1>
                  <div class="product-grid" id="grid-${category}"></div>
                </section>
            `;

                    const grid = document.getElementById(`grid-${category}`);

                    categories[category].forEach(product => {
                        const card = `
                          <div class="product-card">
                            <img src="${product.image}" 
                                 class="card-img" 
                                 style="cursor: pointer;" 
                                 onclick="openPreview('${product.image}')" 
                                 title="Click for big preview">
                            <div class="card-body">
                              <h3 class="card-title">${product.title}</h3>
                              <p class="card-description">
                                ${product.board_size ? `Board Size: <b>${product.board_size}</b><br>` : ''}
                                Type: <b>${product.type}</b><br>
                                ${product.texture_count !== undefined ? `Texture Count: <b>${product.texture_count}</b><br>` : ''}
                                Dimensions: <b>${product.dimensions}</b>
                              </p>
                            </div>
                          </div>
                        `;
                        grid.innerHTML += card;
                    });
                }
            });
    </script>

</body>
</html>
